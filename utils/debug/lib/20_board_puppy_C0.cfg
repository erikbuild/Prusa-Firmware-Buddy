# Ensure OpenOCD does support STM32C092 devices - use specific OpenOCD https://github.com/ivous/OpenOCD/tree/C092"
# see /util/debug/README_STM32C0.md
set setup_debugger_puppy_proc setup_debugger_$PUPPY_TYPE

if { $setup_debugger_puppy_proc in [info commands] } {
    $setup_debugger_puppy_proc
} else {
    echo "No debugger configuration provided. Defaulting to any STLink..."
    use_stlink_dap
}

set CHIPNAME $PUPPY_TYPE

set STOP_WATCHDOG 1

set interface_cfg_path [find target/stm32c0x.cfg]
if { ![file exists $interface_cfg_path]} {
    # TODO once official OpenOCD from STMictroelectronics will support fully STM32C092 replace with proper message
    # Unfortunately this message is not printed in case of missing file anyway - probably openocd issue, "find" command exits silently, no message printed
    echo "!!!!!!!!!!!!!!!!!! ERROR: OpenOCD does not support STM32C092 devices - use specific OpenOCD https://github.com/ivous/OpenOCD/tree/C092"
    exit 1
}
source $interface_cfg_path

adapter speed 8000

# The C0 script from ST's openocd doesn't define _TARGETNAME
if { ![info exists _TARGETNAME] } {
    set _TARGETNAME $_CHIPNAME.cpu
}

# For some reason, it doesn't work without this - REMOVEME
# gdb_memory_map disable

$_TARGETNAME configure -event reset-start {
    adapter speed 8000
}

$_TARGETNAME configure -event reset-init {
    adapter speed 4000
}

$_TARGETNAME configure -event gdb-detach {
    shutdown
}
